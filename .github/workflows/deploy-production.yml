name: Deploy → Production
on:
  push:
    branches: [main]
concurrency:
  group: deploy-production
  cancel-in-progress: false
jobs:
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20.x", cache: npm }
      - run: npm ci
      - name: Build for production
        run: npm run build
        env:
          NEXT_PUBLIC_AUTH0_DOMAIN:    ${{ secrets.PROD_AUTH0_DOMAIN }}
          NEXT_PUBLIC_AUTH0_CLIENT_ID: ${{ secrets.PROD_AUTH0_CLIENT_ID }}
          NEXT_PUBLIC_AUTH0_AUDIENCE:  ${{ secrets.PROD_AUTH0_AUDIENCE }}
      - uses: amondnet/vercel-action@v25
        with:
          vercel-token:      ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:     ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args:       --prod
      - uses: actions/create-release@v1
        env: { GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}" }
        with:
          tag_name:     "v${{ github.run_number }}"
          release_name: "Release v${{ github.run_number }}"
          body:         "Auto-released from ${{ github.sha }}"
      - if: success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: '{"text": "ParkingMS PRODUCTION deployed — v${{ github.run_number }}"}'
        env: { SLACK_WEBHOOK_URL: "${{ secrets.SLACK_WEBHOOK_URL }}" }
      - if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: '{"text": "ParkingMS PRODUCTION FAILED — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"}'
        env: { SLACK_WEBHOOK_URL: "${{ secrets.SLACK_WEBHOOK_URL }}" }
